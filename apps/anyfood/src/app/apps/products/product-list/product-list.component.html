@for (ingredient of $products(); track ingredient.name) {
  <div class="p-3 border border-black flex flex-row gap-4">
    @if (ingredient.imgUrl) {
      <img width="120" height="120" [ngSrc]="ingredient.imgUrl" alt="{{ingredient.name}}" />
    }
    <div class="flex flex-col">
      <p>{{ingredient.name}}</p>
      <p>{{ingredient.totalWeight}}g</p>
      <p>{{ingredient.totalPrice}}$</p>
    </div>
  </div>
}


<h3>{{$totalPrice()}}</h3>
