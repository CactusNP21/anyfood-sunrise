<div class="flex flex-col gap-4 items-end">
  <button routerLink="../create">Add product</button>
  <div class="grid grid-cols-2 w-full">
    @for (category of $categories(); track category.id) {
      <div [routerLink]="`../details/${category.id}`" class="p-3 border border-black">
        {{ category.name }}
      </div>
    }
  </div>
</div>
