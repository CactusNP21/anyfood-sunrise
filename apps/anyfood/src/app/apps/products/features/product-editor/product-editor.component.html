<div class="min-h-screen bg-stone-50 pb-24">
  <!-- Top bar -->
  <div
    class="sticky top-0 z-10 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3"
  >
    <a
      [routerLink]="`/products/details/` + $id()"
      class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-stone-100 transition text-gray-500"
    >
      ←
    </a>
    <span class="flex-1 text-sm font-semibold text-gray-900">
      {{ $hasId() ? 'Редагування продукту' : 'Новий продукт' }}
    </span>
    <button
      type="button"
      [disabled]="!productForm().valid()"
      (click)="$hasId() ? editProduct() : createProduct()"
      class="px-4 py-1.5 text-sm font-semibold rounded-xl"
    >
      {{ $hasId() ? 'Зберегти' : 'Створити' }}
    </button>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-5 flex flex-col gap-4">
    <!-- SECTION: Основне -->
    <div
      class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
    >
      <div class="px-4 pt-4 pb-2">
        <p
          class="text-[11px] uppercase tracking-wider text-gray-400 font-medium"
        >
          Основне
        </p>
      </div>
      <div class="px-4 pb-4 flex flex-col gap-4">
        <anyfood-input
          inputID="productName"
          [formField]="productForm.name"
          label="Назва продукту"
          placeholder="Наприклад: Куряча грудка"
        />

        <anyfood-input
          inputID="imageUrl"
          [formField]="productForm.imageUrl"
          label="Image URL"
          placeholder="https://..."
        />

        <!-- Image preview -->
        @if ($imagePreview(); as url) {
          <div
            class="rounded-xl overflow-hidden border border-gray-100 bg-stone-50 flex items-center justify-center h-40"
          >
            <anyfood-image [height]="160" [width]="160" [src]="url" />
          </div>
        }
      </div>
    </div>

    <!-- SECTION: Батьківський продукт> -->
    <div
      class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
    >
      <div class="px-4 pt-4 pb-2">
        <p
          class="text-[11px] uppercase tracking-wider text-gray-400 font-medium"
        >
          Батьківській продукт
        </p>
      </div>
      <div class="px-4 pb-4">
        <anyfood-selection
          inputID="parentProductId"
          [formField]="productForm.parentProductId"
          label="Батьківський продукт"
          [options]="$products()"
          [primaryKey]="'id'"
          [valueKey]="'id'"
          [displayKey]="'name'"
          [imgKey]="'imageUrl'"
          [multiple]="false"
        />
      </div>
    </div>

    <!-- SECTION: Макронутрієнти -->
    <div
      class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
    >
      <div class="px-4 pt-4 pb-2">
        <p
          class="text-[11px] uppercase tracking-wider text-gray-400 font-medium"
        >
          Макронутрієнти
        </p>
        <p class="text-xs text-gray-400 mt-0.5">на 100г продукту</p>
      </div>
      <div class="px-4 pb-4 grid grid-cols-3 gap-3">
        <anyfood-input
          inputID="protein"
          [formField]="productForm.protein"
          label="Білки (г)"
          type="number"
          placeholder="0"
        />
        <anyfood-input
          inputID="fat"
          [formField]="productForm.fat"
          label="Жири (г)"
          type="number"
          placeholder="0"
        />
        <anyfood-input
          inputID="carbs"
          [formField]="productForm.carbs"
          label="Вуглеводи (г)"
          type="number"
          placeholder="0"
        />
      </div>
    </div>

    <!-- SECTION: Ціна -->
    <div
      class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
    >
      <div class="px-4 pt-4 pb-2">
        <p
          class="text-[11px] uppercase tracking-wider text-gray-400 font-medium"
        >
          Ціна
        </p>
        <p class="text-xs text-gray-400 mt-0.5">за 100г продукту</p>
      </div>
      <div class="px-4 pb-4">
        <anyfood-input
          inputID="price"
          [formField]="productForm.price"
          label="Ціна (₴)"
          type="number"
          placeholder="0.00"
        />
      </div>
    </div>
  </div>
</div>
