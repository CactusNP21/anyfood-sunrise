@let product = $productDetails();

@if (product) {
  <div>
    <anyfood-image [src]="product.imageUrl" [width]="128" [height]="128" />
    <p>{{ product.name }}</p>
    <p>Protein: {{ product.protein }}</p>
    <p>Fat: {{ product.fat }}</p>
    <p>Carbs: {{ product.carbs }}</p>
    <p>Calories: {{ product.calories }}</p>
    <p>Price: {{ product.price }} грн</p>
  </div>
  <button danger (click)="deleteProduct()">Delete</button>
  <button secondary (click)="editProduct()">Edit</button>
}
