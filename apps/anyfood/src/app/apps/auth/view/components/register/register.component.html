<div class="flex h-screen">

  <!-- ── RIGHT PANEL ── -->
  <div class="w-full flex items-center justify-center bg-orange-50 px-8 py-12 overflow-y-auto">
    <div class="w-full max-w-md">

      <div class="mb-7">
        <h1 class="text-4xl font-bold text-gray-900 font-serif tracking-tight mb-2">Починаємо!</h1>
      </div>

      <form novalidate class="flex flex-col gap-4">

          <anyfood-input
            [inputID]="'name'"
            placeholder="Вася"
            [label]="'Імʼя'"
            [formField]="form.name"
          />

        <anyfood-input
          [inputID]="'username'"
          placeholder="vasya"
          [label]="'Логін'"
          [formField]="form.username"
        />

        <anyfood-input
          [inputID]="'email'"
          placeholder="vasya@gmail.com"
          [label]="'Пошта'"
          [autocomplete]="'email'"
          [formField]="form.email"
        />

        <anyfood-input
          [inputID]="'password'"
          placeholder="Мінімум 8 символів"
          [label]="'Пароль'"
          [autocomplete]="'new-password'"
          [formField]="form.password"
          type="password"
        />

        <anyfood-input
          [inputID]="'repeat-password'"
          placeholder="••••••••"
          [label]="'Повторіть пароль'"
          [autocomplete]="'new-password'"
          [formField]="form.confirmPassword"
          type="password"
        />

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="$isLoading()"
          class="flex items-center justify-center gap-2.5 w-full py-4 mt-2 rounded-xl bg-orange-500 text-white font-semibold text-base
                 hover:bg-orange-600 hover:-translate-y-px hover:shadow-lg hover:shadow-orange-500/30
                 active:translate-y-0 disabled:opacity-70 disabled:cursor-not-allowed transition-all"
        >
          @if ($isLoading()) {
            <span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span>Створюємо акаунт...</span>
          } @else {
            <span>Створити акаунт</span>
            <span class="text-lg">→</span>
          }
        </button>

      </form>

      <p class="mt-6 text-center text-sm text-gray-400">
        Вже маєте акаунт?
        <a routerLink="/auth/login" class="text-orange-500 font-semibold ml-1 hover:text-orange-600 hover:underline transition">
          Увійти
        </a>
      </p>

    </div>
  </div>

</div>
