<div class="flex h-screen">
  <!-- ── LEFT PANEL ── -->
  <div
    class="hidden lg:flex lg:w-1/2 relative bg-cover bg-center"
    style="
      background-image: url('https://images.unsplash.com/photo-1555243896-c709bfa0b564?w=900&auto=format&fit=crop');
    "
  >
    <div
      class="absolute inset-0 bg-gradient-to-br from-black/70 via-orange-800/50 to-black/80"
    ></div>
    <div class="relative z-10 flex flex-col justify-between h-full p-12">
      <div class="flex items-center gap-3">
        <span class="text-4xl">🍽</span>
        <span class="text-3xl font-bold text-white tracking-tight font-serif"
          >AnyFood</span
        >
      </div>

      <blockquote
        class="text-3xl font-serif font-medium text-white leading-snug drop-shadow-lg"
      >
        "Їжа — це не просто паливо.<br />Це задоволення, культура,<br />і
        турбота про себе."
      </blockquote>

      <div class="flex items-center gap-6">
        <div class="flex flex-col">
          <span class="text-3xl font-bold text-white font-serif">500+</span>
          <span class="text-xs uppercase tracking-wider text-white/70"
            >Рецептів</span
          >
        </div>
        <div class="w-px h-10 bg-white/25"></div>
        <div class="flex flex-col">
          <span class="text-3xl font-bold text-white font-serif">7</span>
          <span class="text-xs uppercase tracking-wider text-white/70"
            >Днів планування</span
          >
        </div>
        <div class="w-px h-10 bg-white/25"></div>
        <div class="flex flex-col">
          <span class="text-3xl font-bold text-white font-serif">∞</span>
          <span class="text-xs uppercase tracking-wider text-white/70"
            >Натхнення</span
          >
        </div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div
    class="w-full lg:w-1/2 flex items-center justify-center bg-orange-50 px-8 py-12 overflow-y-auto"
  >
    <div class="w-full max-w-md">
      <div class="mb-8">
        <h1
          class="text-4xl font-bold text-gray-900 font-serif tracking-tight mb-2"
        >
          З поверненням
        </h1>
        <p class="text-gray-500 text-base">
          Увійдіть, щоб продовжити готувати смачне
        </p>
      </div>

      <form novalidate class="flex flex-col gap-5">
        <!-- Username -->
        <anyfood-input
          [inputID]="'username'"
          [autocomplete]="'username'"
          [label]="'Логін'"
          [formField]="form.username"
        />

        <anyfood-input
          inputID="userpassword"
          [label]="'Пароль'"
          [type]="'password'"
          [autocomplete]="'current-password'"
          [formField]="form.password"
        />
        <div class="flex justify-end -mt-2">
          <a
            routerLink="/auth/forgot-password"
            class="text-sm text-gray-400 hover:text-orange-500 transition"
          >
            Забули пароль?
          </a>
        </div>

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="$isLoading()"
          class="flex items-center justify-center gap-2.5 w-full py-4 mt-1 rounded-xl bg-orange-500 text-white font-semibold text-base hover:bg-orange-600 hover:-translate-y-px hover:shadow-lg hover:shadow-orange-500/30 active:translate-y-0 disabled:opacity-70 disabled:cursor-not-allowed transition-all"
        >
          @if ($isLoading()) {
            <span
              class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"
            ></span>
            <span>Входимо...</span>
          } @else {
            <span>Увійти</span>
            <span class="text-lg">→</span>
          }
        </button>
      </form>

      <p class="mt-7 text-center text-sm text-gray-400">
        Ще не маєте акаунту?
        <a
          routerLink="/auth/register"
          class="text-orange-500 font-semibold ml-1 hover:text-orange-600 hover:underline transition"
        >
          Зареєструватись
        </a>
      </p>
    </div>
  </div>
</div>
