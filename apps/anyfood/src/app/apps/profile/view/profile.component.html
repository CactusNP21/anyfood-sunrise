<div class="min-h-screen bg-orange-50 flex items-center justify-center p-6">

  @if (facade.$isLoading()) {
    <div class="flex items-center gap-3 text-gray-400">
      <span class="w-6 h-6 border-2 border-gray-300 border-t-orange-500 rounded-full animate-spin"></span>
      <span class="text-sm">Завантаження...</span>
    </div>
  } @else if (facade.error()) {
    <div class="text-red-500 text-sm">{{ facade.error() }}</div>
  } @else if (facade.profile(); as profile) {
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm p-8 flex flex-col items-center gap-6">

      <!-- Avatar -->
      <div class="relative">
        @if (profile.avatarUrl) {
          <img
            [src]="profile.avatarUrl"
            [alt]="profile.name"
            class="w-24 h-24 rounded-full object-cover ring-4 ring-orange-100"
          />
        } @else {
          <div class="w-24 h-24 rounded-full bg-orange-100 flex items-center justify-center ring-4 ring-orange-50">
            <span class="text-3xl font-bold text-orange-500 font-serif">
              {{ profile.name.charAt(0).toUpperCase() }}
            </span>
          </div>
        }
      </div>

      <!-- Info -->
      <div class="flex flex-col items-center gap-1 text-center">
        <h1 class="text-2xl font-bold text-gray-900 font-serif tracking-tight">{{ profile.name }}</h1>
        <p class="text-sm text-gray-400">@{{ profile.username }}</p>
      </div>

      <div class="w-full h-px bg-gray-100"></div>

      <!-- Details -->
      <div class="w-full flex flex-col gap-3">
        <div class="flex items-center gap-3 text-sm">
          <span class="text-base">✉️</span>
          <span class="text-gray-500">{{ profile.email }}</span>
        </div>
      </div>

    </div>
  }

</div>
