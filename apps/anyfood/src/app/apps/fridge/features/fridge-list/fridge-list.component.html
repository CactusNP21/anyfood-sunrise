<div class="min-h-screen bg-stone-50">
  <!-- Header -->
  <div class="sticky top-0 z-10 bg-white border-b border-gray-100 px-4 py-4">
    <div class="flex items-center justify-between max-w-2xl mx-auto">
      <div>
        <h1 class="text-xl font-bold text-gray-900 font-serif tracking-tight">
          Продукти
        </h1>
        <p class="text-xs text-gray-400 mt-0.5">
          {{ $fridgeProducts().length }} продуктів
        </p>
      </div>
      <button routerLink="../create" lg class="flex items-center gap-2">
        <span class="text-lg leading-none">+</span>
        <span>Додати</span>
      </button>
    </div>
  </div>

  <!-- List -->
  <div class="max-w-2xl mx-auto px-4 py-5 flex flex-col gap-3">
    @if ($fridgeProducts().length === 0) {
      <div class="flex flex-col items-center justify-center py-24 text-center">
        <span class="text-5xl mb-4">🥦</span>
        <h2 class="text-base font-semibold text-gray-700 font-serif mb-1">
          Продуктів ще немає
        </h2>
        <p class="text-sm text-gray-400 mb-5">
          Додайте перший продукт до глосарію
        </p>
        <button routerLink="../create" lg>Додати продукт</button>
      </div>
    } @else {
      @for (product of $fridgeProducts(); track product.id) {
        <a
          [routerLink]="'products/details/' + product.id"
          class="bg-white rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4 p-3 hover:border-orange-200 hover:shadow-md active:scale-[0.99] transition-all no-underline"
        >
          <!-- Image -->
          <div
            class="w-16 h-16 rounded-xl bg-stone-50 flex items-center justify-center flex-shrink-0 overflow-hidden border border-gray-100"
          >
            <anyfood-image
              [src]="product.imageUrl"
              [width]="64"
              [height]="64"
              class="object-contain"
            />
          </div>

          <!-- Info -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <p class="text-sm font-semibold text-gray-900 truncate">
                {{ product.productName }}
              </p>
              <p>
                {{ product.weight }}
              </p>
            </div>
          </div>
        </a>
      }
    }
  </div>
</div>
