<header class="bg-white border-b border-gray-100">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2.5 no-underline">
      <anyfood-image [height]="48" [width]="96" [src]="'/anyfood.svg'"></anyfood-image>
    </a>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-1">
      <a
        routerLink="/categories"
        routerLinkActive="text-orange-500 bg-orange-50"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
      >
        Категорії
      </a>

      <a
        routerLink="/products"
        routerLinkActive="text-orange-500 bg-orange-50"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
      >
        Продукти
      </a>

      <a
        routerLink="/recipes"
        routerLinkActive="text-orange-500 bg-orange-50"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
      >
        Рецепти
      </a>
      <a
        routerLink="/schedule"
        routerLinkActive="text-orange-500 bg-orange-50"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
      >
        Розклад
      </a>
      <a
        routerLink="/shopping-list"
        routerLinkActive="text-orange-500 bg-orange-50"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
      >
        Список покупок
      </a>
    </nav>

  </div>

  <!-- Mobile menu -->
  @if ($isMobileMenuOpen()) {
    <div class="md:hidden border-t border-gray-100">
      <nav class="max-w-6xl mx-auto px-6 py-4 flex flex-col gap-2">
        <a
          routerLink="/categories"
          routerLinkActive="text-orange-500 bg-orange-50"
          (click)="$isMobileMenuOpen.set(false)"
          class="px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
        >
          Категорії
        </a>
        <a
          routerLink="/products"
          routerLinkActive="text-orange-500 bg-orange-50"
          (click)="$isMobileMenuOpen.set(false)"
          class="px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
        >
          Продукти
        </a>
        <a
          routerLink="/recipes"
          routerLinkActive="text-orange-500 bg-orange-50"
          (click)="$isMobileMenuOpen.set(false)"
          class="px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
        >
          Рецепти
        </a>
        <a
          routerLink="/meal-plan"
          routerLinkActive="text-orange-500 bg-orange-50"
          (click)="$isMobileMenuOpen.set(false)"
          class="px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
        >
          Меню тижня
        </a>
        <a
          routerLink="/shopping-list"
          routerLinkActive="text-orange-500 bg-orange-50"
          (click)="$isMobileMenuOpen.set(false)"
          class="px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:text-orange-500 hover:bg-orange-50 transition"
        >
          Список покупок
        </a>
      </nav>
    </div>
  }
</header>
