<div class="flex flex-col">
  <anyfood-label [controlId]="$id()" [text]="$label()" />
  <input
    [id]="$id()"
    [type]="$type()"
    [autocomplete]="$autocomplete()"
    [value]="value()"
    (change)="valueChange(inputElement)"
    (blur)="touched.set(true)"
    #inputElement
    class="border w-full py-3.5 rounded-xl border-gray-200 text-gray-900 text-sm outline-none transition p-2 bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 placeholder:text-gray-300"
    [placeholder]="$placeholder()"
    [class.border-red-400]="invalid() && touched()"
  />
  @if (invalid() && touched()) {
    @for (userError of this.errors(); track userError) {
      <p class="text-xs text-red-500 pl-2">{{ userError.message }}</p>
    }
  }
</div>
