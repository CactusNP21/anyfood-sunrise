<div
  class="flex flex-col w-full" (click)="openOverlay()"
  cdkOverlayOrigin
  #trigger='cdkOverlayOrigin'
>
  <anyfood-label [controlId]="''" [text]="$label()"/>
  <div class="flex gap-2 flex-1">
    <input
      [formField]="$input" class="border rounded-2xl p-2 flex-1" [placeholder]="$placeholder()">
    <span>dropdown_icon</span>
  </div>
</div>

<ng-template
  cdkConnectedOverlay
  cdkConnectedOverlayHasBackdrop
  cdkConnectedOverlayFlexibleDimensions
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayOrigin]="trigger"
  cdkConnectedOverlayMatchWidth
  [cdkConnectedOverlayUsePopover]="'inline'"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayOpen]="$isOverlayOpen()"
  (detach)="closeOverlay()"
  (backdropClick)="closeOverlay()"
>
  <div class="bg-amber-300 w-full option-text overflow-auto max-h-96">
    @let displayKey = $displayKey();
      @for (opt of optionsResource.value(); track opt[$primaryKey()]) {
        <div class=" w-full border-t bg-[#F4F7FF] p-2 flex gap-3 items-center"
             [class.bg-blue-500]="$valueMap().has(opt[$primaryKey()])"
             (click)="toggleOption(opt)">
          <span class="w-8 h-8">
            <img class="border border-[#000476] rounded h-full w-full" [decoding]="'async'" [ngSrc]="getImg(opt)" width="32" height="32" alt="product photo">
          </span>
          <span>
          {{ opt[displayKey] }}
          </span>
        </div>
      }
  </div>
</ng-template>
