<div class="flex flex-col"
     (click)="isOpen = true"
>
  <anyfood-label [controlId]="''" [text]="$label()"/>
  <div class="flex gap-2"
       cdkOverlayOrigin
       #trigger="cdkOverlayOrigin">
    <input
      [field]="$input" class="border rounded-2xl p-2" [placeholder]="$placeholder()">
    <span>dropdown_icon</span>
  </div>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayMatchWidth]="true"
  [cdkConnectedOverlayUsePopover]="'inline'"
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen"
  (detach)="isOpen = false"
  (backdropClick)="isOpen = false"
>
  <div class="bg-amber-300 w-full option-text">
    @let displayKey = $displayKey();
      @for (opt of optionsResource.value(); track opt[$primaryKey()]) {
        <div class=" w-full border-t bg-[#F4F7FF] p-2 flex gap-3 items-center" (click)="toggleOption(opt)">
          <span>
            <img class="border border-[#000476] rounded" [ngSrc]="getImg(opt)" width="32" height="32" alt="product photo">
          </span>
          <span>
          {{ opt[displayKey] }}
          </span>
        </div>
      }
  </div>
</ng-template>
